name: PHP Runtime build

on:
  push:
    paths:
      - 'runtime.Dockerfile'
      - '.github/workflows/runtime.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }}
  DOCKER_BUILD_RECORD_UPLOAD: false
  GHCR_IMAGE_NAME: ghcr.io/thanatosdi/php-runtime
  DOCKERHUB_IMAGE_NAME: docker.io/thanatosdi/php-runtime

jobs:
  build:
    name: Build PHP${{ matrix.php-version }} ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'stage' }}
    permissions:
      contents: read
      packages: write
    outputs:
      push_image: ${{ vars.PUSH_IMAGE }}

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            slug: 'amd64'
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            slug: 'arm64'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE_NAME }}

      - name: Build and Push by Digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./runtime.Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            PHP_EXTENSIONS=pcntl
          outputs: type=image,"name=${{ env.GHCR_IMAGE_NAME }},${{ env.DOCKERHUB_IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=${{ vars.PUSH_IMAGE }}
          cache-from: type=gha,scope=build-${{ matrix.php-version }}-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.php-version }}-${{ matrix.slug }}

      - name: Export Digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload Digest Artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-php${{ matrix.php-version }}-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge PHP${{ matrix.php-version }}
    runs-on: ubuntu-latest
    if: ${{ needs.build.outputs.push_image == 'true' }}
    permissions:
      contents: read
      packages: write
    needs: build
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - name: Get current date
        id: date
        run: echo "today=$(TZ=Asia/Taipei date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Merge Manifest to GHCR
        uses: ThanatosDi/merge-docker-digests@main
        with:
          image-name: ${{ env.GHCR_IMAGE_NAME }}
          artifact-pattern: digests-php${{ matrix.php-version }}-*
          tags: |
            ${{ matrix.php-version }}
            ${{ matrix.php-version }}-${{ steps.date.outputs.today }}
          timezone: Asia/Taipei
          registry: ghcr.io
          registry-username: ${{ github.actor }}
          registry-password: ${{ github.token }}

      - name: Merge Manifest to Docker Hub
        uses: ThanatosDi/merge-docker-digests@main
        with:
          image-name: ${{ env.DOCKERHUB_IMAGE_NAME }}
          artifact-pattern: digests-php${{ matrix.php-version }}-*
          tags: |
            ${{ matrix.php-version }}
            ${{ matrix.php-version }}-${{ steps.date.outputs.today }}
          timezone: Asia/Taipei
          registry: docker.io
          registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
