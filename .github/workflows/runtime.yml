name: PHP Runtime build

on:
  push:
    paths:
      - 'runtime.Dockerfile'
      - '.github/workflows/runtime.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }}
  DOCKER_BUILD_RECORD_UPLOAD: false
  IMAGE_NAME: ghcr.io/thanatosdi/php-runtime

jobs:
  build:
    name: Build PHP${{ matrix.php-version }} ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    # 【關鍵】定義矩陣策略，同時跑 4 個版本
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4']
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            slug: 'amd64'
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            slug: 'arm64'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and Push by Digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./runtime.Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            PHP_EXTENSIONS=pcntl
          # 關鍵設定：這裡一定要輸出 type=image 並且 push-by-digest=true
          # 這樣才不會互相覆蓋 Tag，而是產生獨立的 Manifest
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.php-version }}-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.php-version }}-${{ matrix.slug }}

      - name: Export Digest
        # 將產生的 Digest 存成檔案，供下一個 Merge Job 使用
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload Digest Artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-php${{ matrix.php-version }}-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # 合併 Image 並推送最終 Tag
  merge:
    name: Merge PHP${{ matrix.php-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: build
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Get current date
        id: date
        run: echo "today=$(TZ=Asia/Taipei date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Merge Manifest
        uses: ThanatosDi/merge-docker-digests@main
        with:
          image-name: ${{ env.IMAGE_NAME }}
          artifact-pattern: digests-php${{ matrix.php-version }}-*
          tags: |
            ${{ matrix.php-version }}
            ${{ matrix.php-version }}-${{ steps.date.outputs.today }}
          timezone: Asia/Taipei
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ github.token }}